DATA:
  TRAIN:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 5000
  VAL:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000

MODEL:
  UWB:
    ENABLE: True
    ENCODER: conv1d
    SEQ_LEN: 5
    INPUT_DIM: 2
    EMBED_DIM: 768
    MLP_HIDDEN_DIMS:
    - 32
    - 64
    - 128
    - 256
    CONV_CHANNELS:
    - 32
    - 64
    - 128
    - 256
    CONV_KERNEL_SIZE: 3
    TEMPORAL_POOL: mean
    TOKEN_HEAD: identity
    ALPHA_HEAD: mlp
    PRED_HEAD: mlp
    ALPHA_ACT: sigmoid
    PRED_ACT: sigmoid

TRAIN:
  STAGE: 1
  LR: 0.0004
  WEIGHT_DECAY: 0.0001
  EPOCH: 300
  LR_DROP_EPOCH: 40
  BATCH_SIZE: 32
  NUM_WORKER: 0
  OPTIMIZER: ADAMW
  UWB_PRED_WEIGHT: 50
  UWB_ALPHA_WEIGHT: 5
  PRINT_INTERVAL: 20
  VAL_EPOCH_INTERVAL: 5
  GRAD_CLIP_NORM: 0.1
  AMP: False
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
