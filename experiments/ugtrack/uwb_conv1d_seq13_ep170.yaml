DATA:
  UWB:
    SEQ_LEN: 13
  TRAIN:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 5000
  VAL:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000

MODEL:
  USE_UWB: True
  BACKBONE:
    UWB_ENCODER: conv1d
    UWB_INPUT_DIM: 2
    UWB_EMBED_DIM: 768
    UWB_MLP_HIDDEN_DIMS:
    - 32
    - 64
    - 128
    - 256
    UWB_CONV_CHANNELS:
    - 32
    - 64
    - 128
    - 256
    UWB_CONV_KERNEL_SIZE: 3
    UWB_TEMPORAL_POOL: mean
  HEAD:
    UWB_TOKEN_HEAD: identity
    UWB_ALPHA_ACT: sigmoid
    UWB_PRED_ACT: sigmoid

TRAIN:
  STAGE: 1
  LR: 0.0004
  WEIGHT_DECAY: 0.0001
  EPOCH: 170
  LR_DROP_EPOCH: 70
  BATCH_SIZE: 32
  NUM_WORKER: 0
  OPTIMIZER: ADAMW
  UWB_PRED_WEIGHT: 50
  UWB_ALPHA_WEIGHT: 5
  PRINT_INTERVAL: 50
  VAL_EPOCH_INTERVAL: 10
  GRAD_CLIP_NORM: 0.1
  AMP: False
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
