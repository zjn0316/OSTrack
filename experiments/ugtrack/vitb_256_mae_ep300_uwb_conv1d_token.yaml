DATA:
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SAMPLER_MODE: causal
  MAX_SAMPLE_INTERVAL: 200
  TRAIN:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 5000
  VAL:
    DATASETS_NAME:
    - OTB100_UWB
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000
  SEARCH:
    NUMBER: 1
    SIZE: 256
    FACTOR: 4.0
    CENTER_JITTER: 3
    SCALE_JITTER: 0.25
  TEMPLATE:
    NUMBER: 1
    SIZE: 128
    FACTOR: 2.0
    CENTER_JITTER: 0
    SCALE_JITTER: 0

MODEL:
  PRETRAIN_FILE: mae_pretrain_vit_base.pth
  EXTRA_MERGER: False
  RETURN_INTER: False
  RETURN_STAGES: []
  BACKBONE:
    TYPE: vit_base_patch16_224
    STRIDE: 16
    MID_PE: False
    SEP_SEG: False
    CAT_MODE: direct
    MERGE_LAYER: 0
    ADD_CLS_TOKEN: False
    CLS_TOKEN_USE_MODE: ignore
    CE_LOC: []
    CE_KEEP_RATIO: []
    CE_TEMPLATE_RANGE: ALL
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256
  UWB:
    ENABLE: True
    ENCODER: conv1d
    SEQ_LEN: 5
    INPUT_DIM: 2
    EMBED_DIM: 768
    MLP_HIDDEN_DIMS:
    - 32
    - 64
    - 128
    - 256
    CONV_CHANNELS:
    - 32
    - 64
    - 128
    - 256
    CONV_KERNEL_SIZE: 3
    TEMPORAL_POOL: mean
    TOKEN_HEAD: identity
    ALPHA_HEAD: mlp
    PRED_HEAD: mlp
    ALPHA_ACT: sigmoid
    PRED_ACT: sigmoid
    FREEZE_ENCODER: True

TRAIN:
  STAGE: 2
  LR: 0.0004
  WEIGHT_DECAY: 0.0001
  EPOCH: 300
  LR_DROP_EPOCH: 240
  BATCH_SIZE: 16
  NUM_WORKER: 8
  OPTIMIZER: ADAMW
  BACKBONE_MULTIPLIER: 0.1
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  FREEZE_LAYERS:
  - 0
  UWB_PRED_WEIGHT: 50
  UWB_ALPHA_WEIGHT: 5
  PRINT_INTERVAL: 50
  VAL_EPOCH_INTERVAL: 20
  GRAD_CLIP_NORM: 0.1
  AMP: False
  CE_START_EPOCH: 20
  CE_WARM_EPOCH: 80
  DROP_PATH_RATE: 0.1
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1

TEST:
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 128
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 256
  EPOCH: 300
